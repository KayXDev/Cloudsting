services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      - mongo
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        for i in {1..30}; do
          mongosh --host mongo:27017 --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 && break
          sleep 1
        done
        mongosh --host mongo:27017 --eval 'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] })' || true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
